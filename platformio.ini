[platformio]
default_envs = esp32s3

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
monitor_speed = 115200
board_build.partitions = partitions.csv
board_build.flash_size = 16MB
board_build.esp-idf.sdkconfig_defaults = sdkconfig.defaults
extra_scripts = pre:scripts/embed_html.py
build_flags =
    -O3
    -ffunction-sections
    -fdata-sections

[env:debug]
extends = env:esp32s3
build_flags =
    -O3
    -DTAIPANMINER_DEBUG=1
board_build.esp-idf.sdkconfig_defaults = sdkconfig.defaults sdkconfig.debug

[env:native]
platform = native
test_framework = unity
test_filter = test_host
build_flags =
    -O2
    -DUNITY_INCLUDE_DOUBLE
    -Icomponents/mining/include
    -Icomponents/nv_config/include
    -Isrc
    -lm
test_build_src = yes
build_src_filter = +<../components/mining/src/sha256.c> +<../components/mining/src/work.c> +<../components/nv_config/src/nv_config.c>
