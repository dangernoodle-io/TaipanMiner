[platformio]
default_envs = tdongle-s3, bitaxe-601

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
board_upload.flash_size = 16MB
framework = espidf
monitor_speed = 115200
board_build.partitions = partitions.csv
board_build.flash_size = 16MB
board_build.esp-idf.sdkconfig_defaults = sdkconfig.defaults
extra_scripts =
    pre:scripts/embed_html.py
    pre:scripts/embed_partitions.py
build_flags =
    -O3
    -ffunction-sections
    -fdata-sections

[env:tdongle-s3]
extends = env:esp32s3
board_build.cmake_extra_args = -DFIRMWARE_BOARD=tdongle-s3
build_flags =
    ${env:esp32s3.build_flags}
    -DBOARD_TDONGLE_S3

[env:tdongle-s3-debug]
extends = env:tdongle-s3
build_flags =
    ${env:tdongle-s3.build_flags}
    -DTAIPANMINER_DEBUG=1
board_build.esp-idf.sdkconfig_defaults = sdkconfig.defaults sdkconfig/tdongle-s3-debug

[env:bitaxe-601]
extends = env:esp32s3
board_build.cmake_extra_args = -DFIRMWARE_BOARD=bitaxe-601
build_flags =
    ${env:esp32s3.build_flags}
    -DBOARD_BITAXE_601
    -DASIC_BM1370
board_build.esp-idf.sdkconfig_defaults = sdkconfig.defaults sdkconfig/bitaxe-601

[env:bitaxe-601-debug]
extends = env:bitaxe-601
build_flags =
    ${env:bitaxe-601.build_flags}
    -DTAIPANMINER_DEBUG=1
board_build.esp-idf.sdkconfig_defaults = sdkconfig.defaults sdkconfig/bitaxe-601 sdkconfig/bitaxe-601-debug

[env:native]
platform = native
test_framework = unity
test_filter = test_host
extra_scripts =
    pre:scripts/coverage.py
    pre:scripts/embed_partitions.py
build_flags =
    -O0
    -DUNITY_INCLUDE_DOUBLE
    -Icomponents/mining/include
    -Icomponents/nv_config/include
    -Icomponents/asic/include
    -Icomponents/ota_pull/include
    -Icomponents/http_server/include
    -Icomponents/stratum/include
    -I${platformio.packages_dir}/framework-espidf/components/json/cJSON
    -Isrc
    -lm
test_build_src = yes
build_src_filter = +<../components/mining/src/sha256.c> +<../components/mining/src/work.c> +<../components/mining/src/mining.c> +<../components/nv_config/src/nv_config.c> +<../components/asic/src/crc.c> +<../components/asic/src/pll.c> +<../components/asic/src/bm1370.c> +<../components/ota_pull/src/ota_pull.c> +<../components/http_server/src/http_utils.c> +<../components/stratum/src/stratum_utils.c> +<${platformio.packages_dir}/framework-espidf/components/json/cJSON/cJSON.c>
