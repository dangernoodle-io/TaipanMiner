name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: webui/pnpm-lock.yaml
      - name: Build webui for embed
        working-directory: webui
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter miner run build
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Cache PlatformIO
        uses: actions/cache@v5
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini', 'scripts/fetch_breadboard.py', 'dependencies.lock', 'sdkconfig.defaults', 'sdkconfig/**') }}
          restore-keys: ${{ runner.os }}-pio-
      - name: Install tools
        run: pip install platformio gcovr
      - name: Test and coverage
        run: make coverage
      - name: Upload to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          file: gcovr-coveralls.json
          format: coveralls
        env:
          COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_API_TOKEN }}

  webui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: webui/pnpm-lock.yaml
      - name: Install deps
        working-directory: webui
        run: pnpm install --frozen-lockfile
      - name: Typecheck miner
        working-directory: webui
        run: pnpm --filter miner run check
      - name: Typecheck prov
        working-directory: webui
        run: pnpm --filter prov run check
      - name: Unit tests
        working-directory: webui
        run: pnpm --filter miner run test -- --run
      - name: Build miner
        working-directory: webui
        run: pnpm --filter miner run build
      - name: Build prov
        working-directory: webui
        run: pnpm --filter prov run build
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: webui-dist
          path: |
            webui/miner/dist
            webui/prov/dist
          retention-days: 7

  build:
    needs: [test, webui]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [tdongle-s3, bitaxe-601, bitaxe-403, bitaxe-650]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: webui-dist
          path: webui
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Cache cppcheck tool (shared across matrix shards)
        uses: actions/cache@v5
        with:
          path: ~/.platformio/packages/tool-cppcheck
          key: ${{ runner.os }}-pio-tool-cppcheck-1.21100
      - name: Cache PlatformIO toolchain
        uses: actions/cache@v5
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-toolchain-${{ hashFiles('platformio.ini') }}
          restore-keys: ${{ runner.os }}-pio-toolchain-
      - name: Cache ccache (deterministic; no restore-keys)
        uses: actions/cache@v5
        with:
          path: ~/.cache/ccache
          key: ${{ runner.os }}-ccache-${{ matrix.env }}-${{ hashFiles('platformio.ini', 'scripts/fetch_breadboard.py', 'dependencies.lock', 'sdkconfig.defaults', 'sdkconfig/**') }}
      - name: Install tools
        run: |
          sudo apt-get install -y ccache
          pip install platformio
      - name: Static analysis
        run: make check-${{ matrix.env }}
      - name: Build firmware
        run: make build-${{ matrix.env }}

  summary:
    if: always()
    needs: [test, webui, build]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.test.result }}" != "success" ] || [ "${{ needs.webui.result }}" != "success" ] || [ "${{ needs.build.result }}" != "success" ]; then
            echo "test=${{ needs.test.result }} webui=${{ needs.webui.result }} build=${{ needs.build.result }}"
            exit 1
          fi
