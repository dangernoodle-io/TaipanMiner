name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  webui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: webui/pnpm-lock.yaml
      - name: Install deps
        working-directory: webui
        run: pnpm install --frozen-lockfile
      - name: Typecheck miner
        working-directory: webui
        run: pnpm --filter miner run check
      - name: Typecheck prov
        working-directory: webui
        run: pnpm --filter prov run check
      - name: Unit tests
        working-directory: webui
        run: pnpm --filter miner run test -- --run
      - name: Build miner
        working-directory: webui
        run: pnpm --filter miner run build
      - name: Build prov
        working-directory: webui
        run: pnpm --filter prov run build
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: webui-dist
          path: |
            webui/miner/dist
            webui/prov/dist
          retention-days: 7

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Cache PlatformIO
        uses: actions/cache@v5
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini', 'scripts/fetch_breadboard.py', 'dependencies.lock', 'sdkconfig.defaults', 'sdkconfig/**') }}
          restore-keys: ${{ runner.os }}-pio-
      - name: Install tools
        run: pip install platformio
      - name: Test
        run: make test

  build:
    needs: [webui, test]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [tdongle-s3, bitaxe-601, bitaxe-403, bitaxe-650]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: webui-dist
          path: webui
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          # no pip cache — no requirements.txt in repo
      - name: Cache cppcheck tool (shared across matrix shards)
        uses: actions/cache@v5
        with:
          path: ~/.platformio/packages/tool-cppcheck
          key: ${{ runner.os }}-pio-tool-cppcheck-1.21100
      - name: Cache PlatformIO toolchain
        uses: actions/cache@v5
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-toolchain-${{ hashFiles('platformio.ini') }}
          restore-keys: ${{ runner.os }}-pio-toolchain-
      - name: Cache ccache (deterministic; no restore-keys)
        uses: actions/cache@v5
        with:
          path: ~/.cache/ccache
          key: ${{ runner.os }}-ccache-${{ matrix.env }}-${{ hashFiles('platformio.ini', 'scripts/fetch_breadboard.py', 'dependencies.lock', 'sdkconfig.defaults', 'sdkconfig/**') }}
      - name: Install tools
        run: |
          sudo apt-get install -y ccache
          pip install platformio
      - name: Static analysis
        run: make check-${{ matrix.env }}
      - name: Build firmware
        run: make build-${{ matrix.env }}
      - name: Stage release binaries
        run: |
          cp .pio/build/${{ matrix.env }}/firmware.bin taipanminer-${{ matrix.env }}.bin
          cp .pio/build/${{ matrix.env }}/firmware.factory.bin taipanminer-${{ matrix.env }}-factory.bin
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.env }}
          path: |
            taipanminer-${{ matrix.env }}.bin
            taipanminer-${{ matrix.env }}-factory.bin

  aggregate:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: firmware-*
          merge-multiple: true
          path: firmware
      - uses: actions/upload-artifact@v4
        with:
          name: firmware-binaries
          path: firmware/taipanminer-*.bin

  notes-preamble:
    needs: aggregate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: firmware-binaries
          path: firmware
      - name: Build release body
        run: |
          {
            echo "## Binaries"
            echo ""
            echo "Two variants per board:"
            echo ""
            echo "- \`taipanminer-<board>-factory.bin\` — full image (bootloader + partition table + ota_data_initial + app). Use for first-time flashing of a fresh device."
            echo "- \`taipanminer-<board>.bin\` — app-only. Use for OTA updates or push to an already-flashed device."
            echo ""
            echo "| File | Size |"
            echo "|------|------|"
            for f in firmware/taipanminer-*.bin; do
              size=$(du -h "$f" | cut -f1)
              echo "| \`$(basename $f)\` | $size |"
            done
            echo ""
            echo "## Fresh-device flash (USB, esptool)"
            echo ""
            echo '```bash'
            echo "esptool --chip esp32s3 --before default_reset --after hard_reset write-flash 0 taipanminer-<board>-factory.bin"
            echo '```'
            echo ""
            echo "## Existing device (OTA)"
            echo ""
            echo "Via taipan-cli:"
            echo '```bash'
            echo "taipan update --host <miner>.local"
            echo '```'
            echo ""
            echo "Or push the app-only binary:"
            echo '```bash'
            echo "curl -X POST --data-binary @taipanminer-<board>.bin http://<miner>/api/ota/push"
            echo '```'
          } > release-body.md
      - uses: actions/upload-artifact@v4
        with:
          name: release-notes-preamble
          path: release-body.md

  release:
    needs: [aggregate, notes-preamble]
    uses: dangernoodle-io/.github/.github/workflows/gh-release.yml@main
    with:
      assets-artifact: firmware-binaries
      notes-preamble-artifact: release-notes-preamble
    secrets: inherit
    permissions:
      contents: write
