name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      include_debug:
        description: 'Build debug envs'
        type: boolean
        default: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: webui/package-lock.json
      - name: Build webui for embed
        working-directory: webui
        run: |
          npm ci --no-audit --no-fund
          npm run build
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Cache PlatformIO
        uses: actions/cache@v5
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('**/platformio.ini') }}
          restore-keys: ${{ runner.os }}-pio-
      - name: Install tools
        run: pip install platformio gcovr
      - name: Test and coverage
        run: make coverage
      - name: Upload to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          file: gcovr-coveralls.json
          format: coveralls
        env:
          COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_API_TOKEN }}

  webui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: webui/package-lock.json
      - name: Install deps
        working-directory: webui
        run: npm ci --no-audit --no-fund
      - name: Typecheck
        working-directory: webui
        run: npm run check --if-present
      - name: Unit tests
        working-directory: webui
        run: npm test -- --run
      - name: Build
        working-directory: webui
        run: npm run build
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: webui-dist
          path: webui/dist
          retention-days: 7

  build:
    needs: [test, webui]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [tdongle-s3, bitaxe-601, bitaxe-403, bitaxe-650]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: webui-dist
          path: webui/dist
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Cache cppcheck tool (shared across matrix shards)
        uses: actions/cache@v5
        with:
          path: ~/.platformio/packages/tool-cppcheck
          key: ${{ runner.os }}-pio-tool-cppcheck-1.21100
      - name: Cache PlatformIO
        uses: actions/cache@v5
        with:
          path: |
            ~/.platformio
            ~/.cache/ccache
          key: ${{ runner.os }}-pio-build-${{ matrix.env }}-${{ hashFiles('**/platformio.ini') }}
          restore-keys: ${{ runner.os }}-pio-build-${{ matrix.env }}-
      - name: Install tools
        run: |
          sudo apt-get install -y ccache
          pip install platformio
      - name: Static analysis
        run: make check-${{ matrix.env }}
      - name: Build firmware
        run: make build-${{ matrix.env }}

  debug:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.include_debug == 'true'
    needs: [test, webui]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [tdongle-s3-debug, bitaxe-601-debug, bitaxe-403-debug, bitaxe-650-debug]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: webui-dist
          path: webui/dist
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Cache cppcheck tool (shared across matrix shards)
        uses: actions/cache@v5
        with:
          path: ~/.platformio/packages/tool-cppcheck
          key: ${{ runner.os }}-pio-tool-cppcheck-1.21100
      - name: Cache PlatformIO
        uses: actions/cache@v5
        with:
          path: |
            ~/.platformio
            ~/.cache/ccache
          key: ${{ runner.os }}-pio-build-${{ matrix.env }}-${{ hashFiles('**/platformio.ini') }}
          restore-keys: ${{ runner.os }}-pio-build-${{ matrix.env }}-
      - name: Install tools
        run: |
          sudo apt-get install -y ccache
          pip install platformio
      - name: Static analysis
        run: make check-${{ matrix.env }}
      - name: Build debug firmware
        run: make build-${{ matrix.env }}

  summary:
    if: always()
    needs: [test, webui, build]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.test.result }}" != "success" ] || [ "${{ needs.webui.result }}" != "success" ] || [ "${{ needs.build.result }}" != "success" ]; then
            echo "test=${{ needs.test.result }} webui=${{ needs.webui.result }} build=${{ needs.build.result }}"
            exit 1
          fi
