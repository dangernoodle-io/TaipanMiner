# Board-class profile overrides.
# Keys are board-class prefixes matched by fleetlib/profiles.py profile_for().
# Each entry overrides the corresponding Profile dataclass fields for that class.
# Fields not listed use the in-code defaults from profile_for().
#
# hashrate_floor_pct: % of expected_ghs that hashrate must meet.
# Applied to all boards reporting expected_ghs > 0 in /api/stats (not ASIC-only).
# Conservative defaults: catch regressions without false-tripping on steady-state variance.

bitaxe:
  is_asic: true
  has_psram: false
  max_concurrent: 2
  max_rps: 4.0
  poll_interval: 60.0
  vcore_floor_mv: 500
  hashrate_floor_pct: 75.0

esp32-wroom32:
  is_asic: false
  has_psram: false
  max_concurrent: 2
  max_rps: 4.0
  hashrate_floor_pct: 80.0
  readiness_heap_floor: 30000  # no-PSRAM board; global default 50000 is too tight

tdongle-s3:
  is_asic: false
  has_psram: false
  max_concurrent: 2
  max_rps: 4.0
  hashrate_floor_pct: 80.0
  readiness_heap_floor: 30000  # no-PSRAM board; global default 50000 is too tight

esp32-c3:
  is_asic: false
  has_psram: false
  max_concurrent: 1
  max_rps: 2.0
  heap_floor: 30000
  single_worker: true
  hashrate_floor_pct: 70.0
  readiness_heap_floor: 30000  # single-core, small heap; global default 50000 is too tight

esp32-s3:
  is_asic: false
  has_psram: true
  max_concurrent: 4
  max_rps: 10.0
  hashrate_floor_pct: 80.0

esp32-s2:
  is_asic: false
  has_psram: false
  max_concurrent: 2
  max_rps: 4.0
  heap_floor: 8000
  single_worker: true
  hashrate_floor_pct: 75.0
  readiness_heap_floor: 8000  # heap-tight S2; matches heap_floor
