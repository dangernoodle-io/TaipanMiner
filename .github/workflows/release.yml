name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  webui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: webui/package-lock.json
      - name: Install deps
        working-directory: webui
        run: npm install --no-audit --no-fund
      - name: Typecheck
        working-directory: webui
        run: npm run check --if-present
      - name: Unit tests
        working-directory: webui
        run: npm test -- --run
      - name: Build
        working-directory: webui
        run: npm run build
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: webui-dist
          path: webui/dist
          retention-days: 7

  build:
    needs: webui
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [tdongle-s3, bitaxe-601, bitaxe-403, bitaxe-650]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: webui-dist
          path: webui/dist
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          # no pip cache — no requirements.txt in repo
      - name: Cache PlatformIO
        uses: actions/cache@v5
        with:
          path: |
            ~/.platformio
            ~/.cache/ccache
          key: ${{ runner.os }}-pio-build-${{ matrix.env }}-${{ hashFiles('**/platformio.ini') }}
          restore-keys: ${{ runner.os }}-pio-build-${{ matrix.env }}-
      - name: Install tools
        run: |
          sudo apt-get install -y ccache
          pip install platformio
      - name: Static analysis
        run: make check
      - name: Test
        run: make test
      - name: Build firmware
        run: make build-${{ matrix.env }}
      - name: Stage release binaries
        run: |
          cp .pio/build/${{ matrix.env }}/firmware.bin taipanminer-${{ matrix.env }}.bin
          cp .pio/build/${{ matrix.env }}/firmware.factory.bin taipanminer-${{ matrix.env }}-factory.bin
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: taipanminer-${{ matrix.env }}
          path: |
            taipanminer-${{ matrix.env }}.bin
            taipanminer-${{ matrix.env }}-factory.bin

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true
      - name: Build release body
        run: |
          {
            echo "## Binaries"
            echo ""
            echo "Two variants per board:"
            echo ""
            echo "- \`taipanminer-<board>-factory.bin\` — full image (bootloader + partition table + ota_data_initial + app). Use for first-time flashing of a fresh device."
            echo "- \`taipanminer-<board>.bin\` — app-only. Use for OTA updates or push to an already-flashed device."
            echo ""
            echo "| File | Size |"
            echo "|------|------|"
            for f in taipanminer-*.bin; do
              size=$(du -h "$f" | cut -f1)
              echo "| \`$f\` | $size |"
            done
            echo ""
            echo "## Fresh-device flash (USB, esptool)"
            echo ""
            echo '```bash'
            echo "esptool --chip esp32s3 --before default_reset --after hard_reset write-flash 0 taipanminer-<board>-factory.bin"
            echo '```'
            echo ""
            echo "## Existing device (OTA)"
            echo ""
            echo "Via taipan-cli:"
            echo '```bash'
            echo "taipan update --host <miner>.local"
            echo '```'
            echo ""
            echo "Or push the app-only binary:"
            echo '```bash'
            echo "curl -X POST --data-binary @taipanminer-<board>.bin http://<miner>/api/ota/push"
            echo '```'
          } > release-body.md
      - name: Create release
        run: gh release create ${{ github.ref_name }} taipanminer-*.bin --repo ${{ github.repository }} --generate-notes --notes-file release-body.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
