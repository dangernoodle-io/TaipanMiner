name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [tdongle-s3, bitaxe-601, bitaxe-403]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          # no pip cache — no requirements.txt in repo
      - name: Cache PlatformIO
        uses: actions/cache@v5
        with:
          path: |
            ~/.platformio
            ~/.cache/ccache
          key: ${{ runner.os }}-pio-build-${{ matrix.env }}-${{ hashFiles('**/platformio.ini') }}
          restore-keys: ${{ runner.os }}-pio-build-${{ matrix.env }}-
      - name: Install tools
        run: |
          sudo apt-get install -y ccache
          pip install platformio
      - name: Static analysis
        run: make check
      - name: Test
        run: make test
      - name: Build firmware
        run: make build-${{ matrix.env }}
      - name: Rename binary
        run: cp .pio/build/${{ matrix.env }}/firmware.bin taipanminer-${{ matrix.env }}.bin
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: taipanminer-${{ matrix.env }}
          path: taipanminer-${{ matrix.env }}.bin

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true
      - name: Build release body
        run: |
          echo "## Binaries" > release-body.md
          echo "" >> release-body.md
          echo "| File | Size |" >> release-body.md
          echo "|------|------|" >> release-body.md
          for f in taipanminer-*.bin; do
            size=$(du -h "$f" | cut -f1)
            echo "| \`$f\` | $size |" >> release-body.md
          done
          echo "" >> release-body.md
          echo "## Flash" >> release-body.md
          echo '```bash' >> release-body.md
          echo "esptool.py --chip esp32s3 write_flash 0x0 taipanminer-<board>.bin" >> release-body.md
          echo '```' >> release-body.md
      - name: Create release
        run: gh release create ${{ github.ref_name }} taipanminer-*.bin --repo ${{ github.repository }} --generate-notes --notes-file release-body.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
