name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      include_debug:
        description: 'Build debug envs'
        type: boolean
        default: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Cache PlatformIO
        uses: actions/cache@v5
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('**/platformio.ini') }}
          restore-keys: ${{ runner.os }}-pio-
      - name: Install tools
        run: pip install platformio gcovr
      - name: Static analysis
        run: make check
      - name: Test and coverage
        run: make coverage
      - name: Upload to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          file: gcovr-coveralls.json
          format: coveralls
        env:
          COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_API_TOKEN }}

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [tdongle-s3, bitaxe-601, bitaxe-403]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Cache PlatformIO
        uses: actions/cache@v5
        with:
          path: |
            ~/.platformio
            ~/.cache/ccache
          key: ${{ runner.os }}-pio-build-${{ matrix.env }}-${{ hashFiles('**/platformio.ini') }}
          restore-keys: ${{ runner.os }}-pio-build-${{ matrix.env }}-
      - name: Install tools
        run: |
          sudo apt-get install -y ccache
          pip install platformio
      - name: Build firmware
        run: make build-${{ matrix.env }}

  debug:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.include_debug == 'true'
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [tdongle-s3-debug, bitaxe-601-debug, bitaxe-403-debug]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Cache PlatformIO
        uses: actions/cache@v5
        with:
          path: |
            ~/.platformio
            ~/.cache/ccache
          key: ${{ runner.os }}-pio-build-${{ matrix.env }}-${{ hashFiles('**/platformio.ini') }}
          restore-keys: ${{ runner.os }}-pio-build-${{ matrix.env }}-
      - name: Install tools
        run: |
          sudo apt-get install -y ccache
          pip install platformio
      - name: Build debug firmware
        run: make build-${{ matrix.env }}

  summary:
    if: always()
    needs: [test, build]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.test.result }}" != "success" ] || [ "${{ needs.build.result }}" != "success" ]; then
            echo "test=${{ needs.test.result }} build=${{ needs.build.result }}"
            exit 1
          fi
