name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      include_debug:
        description: 'Build debug envs'
        type: boolean
        default: false

jobs:
  webui-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version-file: webui/.nvmrc
          cache: 'pnpm'
          cache-dependency-path: webui/pnpm-lock.yaml
      - name: Install webui deps
        working-directory: webui
        run: pnpm install --frozen-lockfile
      - name: Typecheck miner
        working-directory: webui
        run: pnpm --filter miner run check
      - name: Typecheck prov
        working-directory: webui
        run: pnpm --filter prov run check
      - name: Typecheck flasher
        working-directory: webui
        env:
          VITE_FLASHER_FIXTURES: '1'
        run: pnpm --filter flasher run check
      - name: Typecheck ui-kit
        working-directory: webui
        run: pnpm --filter ui-kit run check
      - name: Webui unit tests with coverage
        working-directory: webui
        run: pnpm --filter miner run test --run --coverage
      - name: Webui prov unit tests with coverage
        working-directory: webui
        run: pnpm --filter prov run test --run --coverage
      - name: Webui ui-kit unit tests with coverage
        working-directory: webui
        run: pnpm --filter ui-kit run test --run --coverage
      - name: Webui flasher unit tests with coverage
        working-directory: webui
        env:
          VITE_FLASHER_FIXTURES: '1'
        run: pnpm --filter flasher run test --run --coverage
      - name: Build miner
        working-directory: webui
        run: pnpm --filter miner run build
      - name: Build prov
        working-directory: webui
        run: pnpm --filter prov run build
      - name: Build flasher (fixtures)
        working-directory: webui
        env:
          VITE_FLASHER_FIXTURES: '1'
        run: pnpm --filter flasher run build
      - name: Upload webui-dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: webui-dist
          path: |
            webui/miner/dist
            webui/prov/dist
          retention-days: 7
      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          parallel: true
          flag-name: webui
          files: webui/miner/coverage/lcov.info webui/prov/coverage/lcov.info webui/ui-kit/coverage/lcov.info webui/flasher/coverage/lcov.info

  native-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-pio-gcovr
      - name: Cache PlatformIO
        uses: actions/cache@v5
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini', 'scripts/fetch_breadboard.py', 'dependencies.lock', 'sdkconfig.defaults', 'sdkconfig/**') }}
          restore-keys: ${{ runner.os }}-pio-
      - name: Cache PlatformIO project libdeps
        uses: actions/cache@v5
        with:
          path: |
            **/.pio/libdeps
            **/.pio/build/**/lib*
          key: ${{ runner.os }}-pio-libdeps-${{ hashFiles('platformio.ini') }}
          restore-keys: ${{ runner.os }}-pio-libdeps-
      - name: Install tools
        run: pip install platformio gcovr
      - name: Native test and coverage
        run: make coverage
      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          parallel: true
          flag-name: native
          files: gcovr-coveralls.json

  e2e:
    needs: webui-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version-file: webui/.nvmrc
          cache: 'pnpm'
          cache-dependency-path: webui/pnpm-lock.yaml
      - uses: actions/download-artifact@v4
        with:
          name: webui-dist
          path: webui
      - name: Install webui deps
        working-directory: webui
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
        run: pnpm install --frozen-lockfile
      - name: Run e2e tests
        working-directory: webui
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
        run: pnpm --filter miner e2e
      - name: Upload e2e coverage to Coveralls
        if: always()
        uses: coverallsapp/github-action@v2
        with:
          flag-name: e2e
          parallel: true
          files: webui/miner/coverage-e2e/lcov.info
          fail-on-error: false
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: webui/miner/playwright-report

  # e2e uses pre-installed Google Chrome on GH runners (channel: chrome) — no playwright install / no apt
  build:
    needs: webui-check
    runs-on: ubuntu-latest
    env:
      CCACHE_DIR: /home/runner/.cache/ccache
      CMAKE_C_COMPILER_LAUNCHER: ccache
      CMAKE_CXX_COMPILER_LAUNCHER: ccache
    strategy:
      matrix:
        env: [tdongle-s3, bitaxe-601, bitaxe-403, bitaxe-650]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: webui-dist
          path: webui
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-pio
      - name: Cache cppcheck tool (shared across matrix shards)
        uses: actions/cache@v5
        with:
          path: ~/.platformio/packages/tool-cppcheck
          key: ${{ runner.os }}-pio-tool-cppcheck-1.21100
      - name: Cache PlatformIO toolchain
        uses: actions/cache@v5
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-toolchain-${{ hashFiles('platformio.ini') }}
          restore-keys: ${{ runner.os }}-pio-toolchain-
      - name: Install tools
        run: |
          sudo apt-get install -y ccache
          pip install platformio
      - name: Initialize ccache dir
        run: |
          mkdir -p "$CCACHE_DIR"
          ccache --max-size=2G
          ccache --zero-stats
      - name: Symlink ccache for ESP toolchains (PATH backup if CMake launcher fails)
        run: |
          for cc in xtensa-esp32s3-elf-gcc xtensa-esp32s3-elf-g++ riscv32-esp-elf-gcc riscv32-esp-elf-g++; do
            sudo ln -sf /usr/bin/ccache /usr/lib/ccache/$cc
          done
          echo "/usr/lib/ccache" >> "$GITHUB_PATH"
      - name: Cache ccache (deterministic; no restore-keys)
        uses: actions/cache@v5
        with:
          path: /home/runner/.cache/ccache
          key: ${{ runner.os }}-ccache-${{ matrix.env }}-${{ hashFiles('platformio.ini', 'scripts/fetch_breadboard.py', 'dependencies.lock', 'sdkconfig.defaults', 'sdkconfig/**') }}
      - name: Static analysis
        run: make check-${{ matrix.env }}
      - name: Build firmware
        run: make build-${{ matrix.env }}
      - name: ccache stats
        if: always()
        run: ccache -s -v

  debug:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.include_debug == 'true'
    needs: webui-check
    runs-on: ubuntu-latest
    env:
      CCACHE_DIR: /home/runner/.cache/ccache
      CMAKE_C_COMPILER_LAUNCHER: ccache
      CMAKE_CXX_COMPILER_LAUNCHER: ccache
    strategy:
      matrix:
        env: [tdongle-s3-debug, bitaxe-601-debug, bitaxe-403-debug, bitaxe-650-debug]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: webui-dist
          path: webui
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-pio
      - name: Cache cppcheck tool (shared across matrix shards)
        uses: actions/cache@v5
        with:
          path: ~/.platformio/packages/tool-cppcheck
          key: ${{ runner.os }}-pio-tool-cppcheck-1.21100
      - name: Cache PlatformIO toolchain
        uses: actions/cache@v5
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-toolchain-${{ hashFiles('platformio.ini') }}
          restore-keys: ${{ runner.os }}-pio-toolchain-
      - name: Install tools
        run: |
          sudo apt-get install -y ccache
          pip install platformio
      - name: Initialize ccache dir
        run: |
          mkdir -p "$CCACHE_DIR"
          ccache --max-size=2G
          ccache --zero-stats
      - name: Symlink ccache for ESP toolchains (PATH backup if CMake launcher fails)
        run: |
          for cc in xtensa-esp32s3-elf-gcc xtensa-esp32s3-elf-g++ riscv32-esp-elf-gcc riscv32-esp-elf-g++; do
            sudo ln -sf /usr/bin/ccache /usr/lib/ccache/$cc
          done
          echo "/usr/lib/ccache" >> "$GITHUB_PATH"
      - name: Cache ccache (deterministic; no restore-keys)
        uses: actions/cache@v5
        with:
          path: /home/runner/.cache/ccache
          key: ${{ runner.os }}-ccache-${{ matrix.env }}-${{ hashFiles('platformio.ini', 'scripts/fetch_breadboard.py', 'dependencies.lock', 'sdkconfig.defaults', 'sdkconfig/**') }}
      - name: Static analysis
        run: make check-${{ matrix.env }}
      - name: Build debug firmware
        run: make build-${{ matrix.env }}
      - name: ccache stats
        if: always()
        run: ccache -s -v

  summary:
    if: always()
    needs: [webui-check, native-test, e2e, build]
    runs-on: ubuntu-latest
    steps:
      - name: Finalize Coveralls
        uses: coverallsapp/github-action@v2
        with:
          parallel-finished: true
      - name: Check results
        run: |
          webui_check="${{ needs.webui-check.result }}"
          native_test="${{ needs.native-test.result }}"
          e2e="${{ needs.e2e.result }}"
          build="${{ needs.build.result }}"

          if [ "$webui_check" != "success" ] || [ "$native_test" != "success" ] || [ "$build" != "success" ]; then
            echo "webui-check=$webui_check native-test=$native_test e2e=$e2e build=$build"
            exit 1
          fi

          if [ "$e2e" == "cancelled" ]; then
            echo "e2e cancelled: $e2e"
            exit 1
          fi
