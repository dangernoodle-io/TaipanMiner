[platformio]
default_envs = tdongle-s3, bitaxe-601, bitaxe-403, bitaxe-650

[env:esp32s3]
; Pin to pioarduino fork — required for the post-build action that auto-generates
; firmware.factory.bin (release.yml depends on it). Default `espressif32` resolves
; to the official Espressif registry build which lacks that hook.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38/platform-espressif32.zip
board = esp32-s3-devkitc-1
board_upload.flash_size = 16MB
framework = espidf
monitor_speed = 115200
board_build.partitions = partitions.csv
board_build.flash_size = 16MB
board_build.esp-idf.sdkconfig_defaults = sdkconfig.defaults
extra_scripts =
    pre:scripts/fetch_breadboard.py
    pre:scripts/embed_partitions.py
build_flags =
    -O3
    -ffunction-sections
    -fdata-sections
; cppcheck only sees one translation unit at a time, so it flags helpers
; called from a sibling .c file as unused. The TA-234 extraction pattern
; deliberately splits pure logic into its own TU, so unusedFunction is
; structurally unreliable here — suppress it globally.
check_flags =
    cppcheck: --suppress=unusedFunction

[env:tdongle-s3]
extends = env:esp32s3
board_build.cmake_extra_args = -DFIRMWARE_BOARD=tdongle-s3
build_flags =
    ${env:esp32s3.build_flags}
    -DBOARD_TDONGLE_S3
    -DBB_HW_BOARD_HEADER=\"boards/tdongle_s3.h\"

[env:tdongle-s3-debug]
extends = env:tdongle-s3
build_flags =
    ${env:tdongle-s3.build_flags}
    -DTAIPANMINER_DEBUG=1
board_build.esp-idf.sdkconfig_defaults = sdkconfig.defaults sdkconfig/tdongle-s3-debug

[env:bitaxe-601]
extends = env:esp32s3
board_build.cmake_extra_args = -DFIRMWARE_BOARD=bitaxe-601
build_flags =
    ${env:esp32s3.build_flags}
    -DBOARD_BITAXE_601
    -DASIC_BM1370
    -DBB_HW_BOARD_HEADER=\"boards/bitaxe_601.h\"
board_build.esp-idf.sdkconfig_defaults = sdkconfig.defaults sdkconfig/bitaxe-601

[env:bitaxe-601-debug]
extends = env:bitaxe-601
build_flags =
    ${env:bitaxe-601.build_flags}
    -DTAIPANMINER_DEBUG=1
board_build.esp-idf.sdkconfig_defaults = sdkconfig.defaults sdkconfig/bitaxe-601 sdkconfig/bitaxe-601-debug

[env:bitaxe-403]
extends = env:esp32s3
board_build.cmake_extra_args = -DFIRMWARE_BOARD=bitaxe-403
build_flags =
    ${env:esp32s3.build_flags}
    -DBOARD_BITAXE_403
    -DASIC_BM1368
    -DBB_HW_BOARD_HEADER=\"boards/bitaxe_403.h\"
board_build.esp-idf.sdkconfig_defaults = sdkconfig.defaults sdkconfig/bitaxe-403

[env:bitaxe-403-debug]
extends = env:bitaxe-403
build_flags =
    ${env:bitaxe-403.build_flags}
    -DTAIPANMINER_DEBUG=1
board_build.esp-idf.sdkconfig_defaults = sdkconfig.defaults sdkconfig/bitaxe-403 sdkconfig/bitaxe-403-debug

[env:bitaxe-650]
extends = env:esp32s3
board_build.cmake_extra_args = -DFIRMWARE_BOARD=bitaxe-650
build_flags =
    ${env:esp32s3.build_flags}
    -DBOARD_BITAXE_650
    -DASIC_BM1370
    -DBB_HW_BOARD_HEADER=\"boards/bitaxe_650.h\"
board_build.esp-idf.sdkconfig_defaults = sdkconfig.defaults sdkconfig/bitaxe-650

[env:bitaxe-650-debug]
extends = env:bitaxe-650
build_flags =
    ${env:bitaxe-650.build_flags}
    -DTAIPANMINER_DEBUG=1
board_build.esp-idf.sdkconfig_defaults = sdkconfig.defaults sdkconfig/bitaxe-650 sdkconfig/bitaxe-650-debug

[env:native]
platform = native
test_framework = unity
test_filter = test_host
custom_bb_components = bb_log bb_nv bb_json bb_http bb_manifest
lib_deps = https://github.com/DaveGamble/cJSON.git#v1.7.18
extra_scripts =
    pre:scripts/fetch_breadboard.py
    pre:.breadboard/scripts/native_scaffold.py
    pre:scripts/coverage.py
    pre:scripts/embed_partitions.py
build_flags =
    -O0
    -std=c99
    -DUNITY_INCLUDE_DOUBLE
    -Icomponents/mining/include
    -Icomponents/taipan_config/include
    -Icomponents/asic/include
    -Icomponents/board/include
    -Icomponents/stratum/include
    -Icomponents/ota_validator/include
    -Icomponents/knot/include
    -Isrc
    -lm
test_build_src = yes
build_src_filter = +<../components/mining/src/sha256.c> +<../components/mining/src/work.c> +<../components/mining/src/mining.c> +<../components/mining/src/mining_pause_state.c> +<../components/taipan_config/src/taipan_config.c> +<../components/asic/src/crc.c> +<../components/asic/src/pll.c> +<../components/asic/src/asic_proto.c> +<../components/asic/src/asic_pause_coalesce.c> +<../components/asic/src/asic_metric_avg.c> +<../components/asic/src/asic_drop_detect.c> +<../components/asic/src/asic_drop_log.c> +<../components/asic/src/asic_chip_routing.c> +<../components/asic/src/asic_nonce_dedup.c> +<../components/stratum/src/stratum_utils.c> +<../components/stratum/src/stratum_backoff.c> +<../components/stratum/src/stratum_watchdogs.c> +<../components/ota_validator/src/ota_validator_state.c> +<../components/knot/src/knot_table.c> +<../src/partition_fixup_decision.c>
