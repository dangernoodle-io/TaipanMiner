name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      include_debug:
        description: 'Build debug envs'
        type: boolean
        default: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: webui/pnpm-lock.yaml
      - name: Install webui deps
        working-directory: webui
        run: pnpm install --frozen-lockfile
      - name: Typecheck miner
        working-directory: webui
        run: pnpm --filter miner run check
      - name: Typecheck prov
        working-directory: webui
        run: pnpm --filter prov run check
      - name: Typecheck flasher
        working-directory: webui
        env:
          VITE_FLASHER_FIXTURES: '1'
        run: pnpm --filter flasher run check
      - name: Webui unit tests with coverage
        working-directory: webui
        run: pnpm --filter miner run test --run --coverage
      - name: Build miner
        working-directory: webui
        run: pnpm --filter miner run build
      - name: Build prov
        working-directory: webui
        run: pnpm --filter prov run build
      - name: Build flasher (fixtures)
        working-directory: webui
        env:
          VITE_FLASHER_FIXTURES: '1'
        run: pnpm --filter flasher run build
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-pio-gcovr
      - name: Cache PlatformIO
        uses: actions/cache@v5
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini', 'scripts/fetch_breadboard.py', 'dependencies.lock', 'sdkconfig.defaults', 'sdkconfig/**') }}
          restore-keys: ${{ runner.os }}-pio-
      - name: Cache PlatformIO project libdeps
        uses: actions/cache@v5
        with:
          path: |
            **/.pio/libdeps
            **/.pio/build/**/lib*
          key: ${{ runner.os }}-pio-libdeps-${{ hashFiles('platformio.ini') }}
          restore-keys: ${{ runner.os }}-pio-libdeps-
      - name: Install tools
        run: pip install platformio gcovr
      - name: Native test and coverage
        run: make coverage
      - name: Upload webui-dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: webui-dist
          path: |
            webui/miner/dist
            webui/prov/dist
          retention-days: 7
      - name: Upload combined coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          files: gcovr-coveralls.json webui/miner/coverage/lcov.info

  build:
    needs: test
    runs-on: ubuntu-latest
    env:
      IDF_CCACHE_ENABLE: '1'
      CCACHE_DIR: ~/.cache/ccache
    strategy:
      matrix:
        env: [tdongle-s3, bitaxe-601, bitaxe-403, bitaxe-650]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: webui-dist
          path: webui
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-pio
      - name: Cache cppcheck tool (shared across matrix shards)
        uses: actions/cache@v5
        with:
          path: ~/.platformio/packages/tool-cppcheck
          key: ${{ runner.os }}-pio-tool-cppcheck-1.21100
      - name: Cache PlatformIO toolchain
        uses: actions/cache@v5
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-toolchain-${{ hashFiles('platformio.ini') }}
          restore-keys: ${{ runner.os }}-pio-toolchain-
      - name: Cache ccache (deterministic; no restore-keys)
        uses: actions/cache@v5
        with:
          path: ~/.cache/ccache
          key: ${{ runner.os }}-ccache-${{ matrix.env }}-${{ hashFiles('platformio.ini', 'scripts/fetch_breadboard.py', 'dependencies.lock', 'sdkconfig.defaults', 'sdkconfig/**') }}
      - name: Install tools
        run: |
          sudo apt-get install -y ccache
          pip install platformio
      - name: Static analysis
        run: make check-${{ matrix.env }}
      - name: Build firmware
        run: make build-${{ matrix.env }}
      - name: ccache stats
        if: always()
        run: ccache -s

  debug:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.include_debug == 'true'
    needs: test
    runs-on: ubuntu-latest
    env:
      IDF_CCACHE_ENABLE: '1'
      CCACHE_DIR: ~/.cache/ccache
    strategy:
      matrix:
        env: [tdongle-s3-debug, bitaxe-601-debug, bitaxe-403-debug, bitaxe-650-debug]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: webui-dist
          path: webui
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-pio
      - name: Cache cppcheck tool (shared across matrix shards)
        uses: actions/cache@v5
        with:
          path: ~/.platformio/packages/tool-cppcheck
          key: ${{ runner.os }}-pio-tool-cppcheck-1.21100
      - name: Cache PlatformIO toolchain
        uses: actions/cache@v5
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-toolchain-${{ hashFiles('platformio.ini') }}
          restore-keys: ${{ runner.os }}-pio-toolchain-
      - name: Cache ccache (deterministic; no restore-keys)
        uses: actions/cache@v5
        with:
          path: ~/.cache/ccache
          key: ${{ runner.os }}-ccache-${{ matrix.env }}-${{ hashFiles('platformio.ini', 'scripts/fetch_breadboard.py', 'dependencies.lock', 'sdkconfig.defaults', 'sdkconfig/**') }}
      - name: Install tools
        run: |
          sudo apt-get install -y ccache
          pip install platformio
      - name: Static analysis
        run: make check-${{ matrix.env }}
      - name: Build debug firmware
        run: make build-${{ matrix.env }}
      - name: ccache stats
        if: always()
        run: ccache -s

  summary:
    if: always()
    needs: [test, build]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.test.result }}" != "success" ] || [ "${{ needs.build.result }}" != "success" ]; then
            echo "test=${{ needs.test.result }} build=${{ needs.build.result }}"
            exit 1
          fi
